# Spin up the infrastructure (PostgreSQL + Redis) the backend depends on:
#   docker compose up -d
# Then run `npm run migration:run` (or set DB_SYNCHRONIZE=true) and `npm run seed`.
version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: career_hub_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: career_hub
    ports:
      - "5432:5432"
    volumes:
      - career_hub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: career_hub_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - career_hub_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  career_hub_pgdata:
  career_hub_redisdata:
